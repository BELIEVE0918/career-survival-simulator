<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI面试模拟器</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div id="app"></div>
    <script>
      window.addEventListener("error", function (event) {
        var app = document.getElementById("app");
        if (!app) return;
        app.innerHTML =
          '<div style="max-width:760px;margin:40px auto;padding:24px;border:1px solid #fecaca;border-radius:8px;background:#fff1f2;color:#7f1d1d;font-family:Microsoft YaHei,Arial,sans-serif;line-height:1.7">' +
          "<h2>页面脚本加载出错</h2>" +
          "<p>请把下面这段错误发给我，我会继续修。</p>" +
          "<pre style='white-space:pre-wrap;background:white;padding:12px;border-radius:6px'>" +
          (event.message || "未知错误") +
          "</pre></div>";
      });
    </script>
    <script src="./app.js"></script>
  </body>
</html>
